openapi: 3.1.0
info:
  title: ShipAgent API
  description: |
    One-prompt deploy service for AI agents and vibe coders.
    Register a domain, deploy your app, configure DNS, and get SSL — all in one API call.
    Payment via x402 protocol (USDC on Base mainnet). No account needed. Just a wallet.
  version: 1.0.0
  contact:
    url: https://domainagent.dev
  license:
    name: MIT

servers:
  - url: https://domainagent.dev
    description: Production
  - url: http://localhost:3001
    description: Local development

tags:
  - name: Discovery
    description: Agent discovery and metadata
  - name: Search
    description: Domain search and recommendations (free)
  - name: Deploy
    description: Domain registration and deployment (x402 payment required)
  - name: Hosting
    description: Hosting management — env vars, logs, rollback
  - name: Status
    description: Deployment and DNS status (free)

paths:
  /.well-known/agent.json:
    get:
      tags: [Discovery]
      summary: Agent discovery metadata
      description: Machine-readable metadata for AI agent discovery. Describes capabilities, payment info, and API links.
      operationId: getAgentJson
      responses:
        '200':
          description: Agent metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentMeta'
              example:
                name: shipagent
                description: One-prompt deploy service for AI agents
                url: https://domainagent.dev
                openapi: https://domainagent.dev/openapi.yaml
                readme: https://domainagent.dev/api/agent-readme

  /api/agent-readme:
    get:
      tags: [Discovery]
      summary: Plain text agent guide
      description: Human and machine readable guide for using ShipAgent as an AI agent.
      operationId: getAgentReadme
      responses:
        '200':
          description: Plain text guide
          content:
            text/plain:
              schema:
                type: string

  /openapi.yaml:
    get:
      tags: [Discovery]
      summary: OpenAPI spec
      description: This OpenAPI specification file.
      operationId: getOpenApiSpec
      responses:
        '200':
          description: OpenAPI YAML
          content:
            text/yaml:
              schema:
                type: string

  /api/search:
    post:
      tags: [Search]
      summary: Search available domains
      description: |
        Search for available domains matching a query keyword.
        Returns availability, pricing, and domain details.
        Free endpoint — no payment required.
      operationId: searchDomains
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
            examples:
              basic:
                summary: Basic search
                value:
                  query: fitness app
              with_tlds:
                summary: Search with specific TLDs
                value:
                  query: fittrack
                  tlds: [".com", ".dev", ".io"]
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
              example:
                results:
                  - domain: fittrack.dev
                    available: true
                    price: 13.99
                    renewalPrice: 13.99
                    currency: USD
                  - domain: fittrack.com
                    available: false
                    price: 12.99
                    currency: USD
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /api/recommend:
    post:
      tags: [Search]
      summary: AI-powered domain recommendations
      description: |
        Get domain suggestions based on a natural language description of your project.
        Uses keyword extraction to generate multiple search queries and returns
        the best available options sorted by relevance and price.
        Free endpoint — no payment required.
      operationId: recommendDomains
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecommendRequest'
            examples:
              fitness:
                summary: Fitness app
                value:
                  description: a fitness tracking app for runners that logs miles and pace
                  budget: 20
              saas:
                summary: SaaS tool
                value:
                  description: project management tool for remote teams
      responses:
        '200':
          description: Domain recommendations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendResponse'
              example:
                keywords: [fitness, tracking, runners]
                suggestions:
                  - domain: fittrack.dev
                    available: true
                    price: 13.99
                    currency: USD
                  - domain: runtrack.dev
                    available: true
                    price: 13.99
                    currency: USD
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /api/pricing:
    get:
      tags: [Search]
      summary: TLD price list
      description: |
        Returns the current price list for common TLDs, plus deploy and redeploy fees.
        Prices are in USD/USDC. Free endpoint — no payment required.
      operationId: getPricing
      responses:
        '200':
          description: Price list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PricingResponse'
              example:
                tlds:
                  .com: 12.99
                  .dev: 13.99
                  .io: 49.99
                  .app: 18.99
                deployFee: 2.0
                redeployFee: 2.0
                currency: USD
                note: Domain prices are approximate. Exact price confirmed at search time.

  /api/status/{domain}:
    get:
      tags: [Status]
      summary: Check deployment status
      description: |
        Returns registration, deployment, DNS, and SSL status for a domain.
        Free endpoint — no payment required.
      operationId: getStatus
      parameters:
        - name: domain
          in: path
          required: true
          schema:
            type: string
          description: Domain name to check (e.g. fittrack.dev)
          example: fittrack.dev
      responses:
        '200':
          description: Deployment status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
              example:
                domain: fittrack.dev
                registered: true
                deployed: true
                dns: true
                ssl: true
                url: https://fittrack.dev
                deployId: abc123
                status: live
                updatedAt: 1712000000000
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/deploy:
    post:
      tags: [Deploy]
      summary: Register domain + deploy + configure DNS
      description: |
        The all-in-one deploy endpoint. In a single call:
        1. Check domain availability
        2. Register the domain via Name.com
        3. Deploy your files to Cloudflare Pages
        4. Configure DNS to point to the deployment
        5. SSL is automatic via Cloudflare

        **x402 Payment Required:**
        This endpoint is protected by the x402 payment protocol.
        Price = domain registration cost + $2 deploy fee.

        **Payment Flow:**
        1. POST to this endpoint → receive HTTP 402 with X-Payment-Required header
        2. Decode payment requirements (USDC amount, recipient address, network)
        3. Sign a USDC transfer authorization on Base mainnet
        4. Retry the same POST with X-Payment header containing signed authorization
        5. On success, receive deploy results

        **File Format:**
        Upload a zip file containing your static site.
        Must have index.html at the root level.
        Supports: HTML, CSS, JS, images, and other static assets.
      operationId: deployApp
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DeployRequest'
      responses:
        '200':
          description: Deploy successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeployResponse'
              example:
                success: true
                url: https://fittrack.dev
                domain: fittrack.dev
                deployId: dep_abc123
                status: live
                ssl: true
                dns: true
                cfPagesUrl: https://fittrack-dev.pages.dev
                note: DNS propagation may take a few minutes. SSL is automatic via Cloudflare.
        '402':
          $ref: '#/components/responses/PaymentRequired'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Domain not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Domain fittrack.dev is not available for registration
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
      x-x402:
        scheme: exact
        network: eip155:8453
        asset: USDC
        assetAddress: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913'
        priceDescription: domain registration cost + $2 deploy fee

  /api/redeploy:
    post:
      tags: [Deploy]
      summary: Redeploy existing site
      description: |
        Update an existing deployment with new files.
        The domain must already be registered and deployed via /api/deploy.

        **x402 Payment Required:**
        Price: $2 USDC flat fee.

        **File Format:**
        Same as /api/deploy — zip file with index.html at root.
      operationId: redeployApp
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RedeployRequest'
      responses:
        '200':
          description: Redeploy successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RedeployResponse'
              example:
                success: true
                url: https://fittrack.dev
                deployId: dep_xyz789
                status: live
        '402':
          $ref: '#/components/responses/PaymentRequired'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Owner mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: No existing deployment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
      x-x402:
        scheme: exact
        network: eip155:8453
        asset: USDC
        assetAddress: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913'
        price: 2.0

  /api/hosting/{domain}/env:
    get:
      tags: [Hosting]
      summary: List environment variables
      description: |
        List environment variable names for a deployed domain. Values are masked.
        Requires wallet authentication.
      operationId: listEnvVars
      security:
        - bearerAuth: []
      parameters:
        - name: domain
          in: path
          required: true
          schema:
            type: string
          description: Domain name
      responses:
        '200':
          description: Environment variables (masked)
          content:
            application/json:
              schema:
                type: object
                properties:
                  domain:
                    type: string
                  envVars:
                    type: object
                    additionalProperties:
                      type: string
                  count:
                    type: integer
              example:
                domain: myapp.dev
                envVars:
                  DATABASE_URL: "***masked***"
                  API_KEY: "***masked***"
                count: 2
        '401':
          description: Authentication required
        '404':
          description: No deployment found
    post:
      tags: [Hosting]
      summary: Set environment variables
      description: |
        Set one or more environment variables for a deployed domain.
        Merges with existing vars. Restarts the app automatically.
        Requires wallet authentication.
      operationId: setEnvVars
      security:
        - bearerAuth: []
      parameters:
        - name: domain
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vars]
              properties:
                vars:
                  type: object
                  description: Key-value pairs to set
                  additionalProperties:
                    type: string
            example:
              vars:
                DATABASE_URL: "postgres://user:pass@host/db"
                NODE_ENV: "production"
      responses:
        '200':
          description: Env vars updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  domain:
                    type: string
                  envVars:
                    type: object
                    additionalProperties:
                      type: string
                  count:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Authentication required
        '404':
          description: No deployment found

  /api/hosting/{domain}/env/{key}:
    delete:
      tags: [Hosting]
      summary: Delete an environment variable
      description: |
        Delete a single environment variable by key. Restarts the app automatically.
        Requires wallet authentication.
      operationId: deleteEnvVar
      security:
        - bearerAuth: []
      parameters:
        - name: domain
          in: path
          required: true
          schema:
            type: string
        - name: key
          in: path
          required: true
          schema:
            type: string
          description: Environment variable key to delete
      responses:
        '200':
          description: Env var deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  domain:
                    type: string
                  deleted:
                    type: string
        '401':
          description: Authentication required
        '404':
          description: Env var or deployment not found

  /api/hosting/{domain}/logs:
    get:
      tags: [Hosting]
      summary: Fetch recent logs
      description: |
        Fetch recent logs for a deployed domain. Only available for Fly-hosted apps.
        Requires wallet authentication.
      operationId: getLogs
      security:
        - bearerAuth: []
      parameters:
        - name: domain
          in: path
          required: true
          schema:
            type: string
        - name: lines
          in: query
          required: false
          schema:
            type: integer
            default: 100
          description: Number of log lines to return
      responses:
        '200':
          description: Log output
          content:
            application/json:
              schema:
                type: object
                properties:
                  domain:
                    type: string
                  logs:
                    type: array
                    items:
                      type: object
                  machineId:
                    type: string
                  timestamp:
                    type: string
        '401':
          description: Authentication required
        '404':
          description: No deployment found

  /api/deploy/preview:
    post:
      tags: [Deploy]
      summary: Deploy to a preview URL
      description: |
        Deploy files to a temporary preview URL (*.fly.dev) without needing a custom domain.
        Perfect for testing before going live. Optionally associate with a domain for later promotion.

        **x402 Payment Required:** $2 USDC.
      operationId: deployPreview
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [owner, files]
              properties:
                owner:
                  type: string
                  description: Wallet address
                domain:
                  type: string
                  description: Optional domain to associate the preview with
                hostingTier:
                  type: string
                  description: Hosting tier (default starter)
                files:
                  type: string
                  format: binary
                  description: Zip file of your site
      responses:
        '200':
          description: Preview deployed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  previewUrl:
                    type: string
                  previewId:
                    type: string
                  domain:
                    type: string
                    nullable: true
                  runtime:
                    type: string
              example:
                success: true
                previewUrl: https://da-preview-abc123.fly.dev
                previewId: da-preview-abc123
                runtime: static
        '402':
          $ref: '#/components/responses/PaymentRequired'
        '400':
          $ref: '#/components/responses/BadRequest'
      x-x402:
        scheme: exact
        network: eip155:8453
        asset: USDC
        assetAddress: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913'
        price: 2.0

  /api/deploy/promote:
    post:
      tags: [Deploy]
      summary: Promote preview to production
      description: |
        Promote a preview deployment to production on a custom domain.
        Wires DNS and SSL automatically. Old production app is cleaned up.
        Requires wallet authentication.
      operationId: deployPromote
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [domain, previewId]
              properties:
                domain:
                  type: string
                  description: Domain to promote the preview to
                previewId:
                  type: string
                  description: Preview app ID from /api/deploy/preview
      responses:
        '200':
          description: Promoted to production
          content:
            application/json:
              schema:
                type: object
                properties:
                  promoted:
                    type: boolean
                  liveUrl:
                    type: string
                  domain:
                    type: string
                  previewId:
                    type: string
              example:
                promoted: true
                liveUrl: https://myapp.dev
                domain: myapp.dev
                previewId: da-preview-abc123
        '401':
          description: Authentication required
        '404':
          description: Deployment or preview not found

  /api/hosting/{domain}/rollback:
    post:
      tags: [Hosting]
      summary: Rollback to previous deploy
      description: |
        Roll back a domain to its previous deployment version.
        Requires at least 2 deploys in history. Keeps last 5 versions.
        Requires wallet authentication.
      operationId: rollback
      security:
        - bearerAuth: []
      parameters:
        - name: domain
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Rolled back successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  rolledBack:
                    type: boolean
                  version:
                    type: integer
                  deployedAt:
                    type: integer
                  domain:
                    type: string
              example:
                rolledBack: true
                version: 2
                deployedAt: 1712000000000
                domain: myapp.dev
        '401':
          description: Authentication required
        '404':
          description: No previous version or deployment not found

  /api/deploy/from-git:
    post:
      tags: [Deploy]
      summary: Deploy from a Git repo
      description: |
        Deploy directly from a GitHub repository URL. Clones the repo, auto-detects
        runtime (Node.js, Python, Docker, or static), builds if needed, and deploys.

        **x402 Payment Required:** $2 USDC.
      operationId: deployFromGit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [domain, repoUrl, owner, email]
              properties:
                domain:
                  type: string
                  description: Domain to deploy to
                repoUrl:
                  type: string
                  description: Git repository URL
                  example: https://github.com/user/repo
                branch:
                  type: string
                  description: Branch to deploy (default main)
                owner:
                  type: string
                  description: Wallet address
                email:
                  type: string
                  description: Contact email for hosting notices
                hostingTier:
                  type: string
                  description: Hosting tier (default starter)
                hostingBilling:
                  type: string
                  description: Billing cycle (monthly or annual)
      responses:
        '200':
          description: Deployed from git
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  url:
                    type: string
                  domain:
                    type: string
                  runtime:
                    type: string
                  hostedBy:
                    type: string
              example:
                success: true
                url: https://myapp.dev
                domain: myapp.dev
                runtime: node
                hostedBy: fly
        '402':
          $ref: '#/components/responses/PaymentRequired'
        '400':
          $ref: '#/components/responses/BadRequest'
      x-x402:
        scheme: exact
        network: eip155:8453
        asset: USDC
        assetAddress: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913'
        price: 2.0

components:
  schemas:
    SearchRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
          description: Keyword or phrase to search for available domains
          example: fitness app
        tlds:
          type: array
          description: TLDs to search (default: .com, .dev, .io, .app, .net, .xyz, .co)
          items:
            type: string
          example: [".com", ".dev", ".io"]

    SearchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/DomainResult'

    RecommendRequest:
      type: object
      required: [description]
      properties:
        description:
          type: string
          description: Natural language description of your project
          example: a fitness tracking app for runners that logs miles and pace
        budget:
          type: number
          description: Maximum domain price in USD (default 100)
          example: 20

    RecommendResponse:
      type: object
      properties:
        keywords:
          type: array
          description: Keywords extracted from your description
          items:
            type: string
          example: [fitness, tracking, runners]
        suggestions:
          type: array
          items:
            $ref: '#/components/schemas/DomainResult'

    DomainResult:
      type: object
      properties:
        domain:
          type: string
          description: Full domain name
          example: fittrack.dev
        available:
          type: boolean
          description: Whether the domain is available for registration
        price:
          type: number
          description: Registration price in USD (first year)
          example: 13.99
        renewalPrice:
          type: number
          description: Annual renewal price in USD
          example: 13.99
        currency:
          type: string
          description: Currency for price
          example: USD

    PricingResponse:
      type: object
      properties:
        tlds:
          type: object
          description: Map of TLD to price in USD
          additionalProperties:
            type: number
          example:
            .com: 12.99
            .dev: 13.99
        deployFee:
          type: number
          description: Deploy fee in USDC (on top of domain cost)
          example: 2.0
        redeployFee:
          type: number
          description: Redeploy fee in USDC
          example: 2.0
        currency:
          type: string
          example: USD
        note:
          type: string

    StatusResponse:
      type: object
      properties:
        domain:
          type: string
          example: fittrack.dev
        registered:
          type: boolean
          description: Whether the domain is registered
        deployed:
          type: boolean
          description: Whether files are deployed to Cloudflare Pages
        dns:
          type: boolean
          description: Whether DNS is configured to point to the deployment
        ssl:
          type: boolean
          description: Whether SSL is active
        url:
          type: string
          nullable: true
          description: Live URL if deployed
          example: https://fittrack.dev
        deployId:
          type: string
          nullable: true
          description: Cloudflare Pages deployment ID
        status:
          type: string
          enum: [unknown, registered, deploying, live, error]
          example: live
        updatedAt:
          type: integer
          nullable: true
          description: Unix timestamp of last status update

    DeployRequest:
      type: object
      required: [domain, owner]
      properties:
        domain:
          type: string
          description: Domain to register and deploy to
          example: fittrack.dev
        owner:
          type: string
          description: Wallet address of the deployer (used for ownership verification on redeploy)
          example: "0x1234567890abcdef1234567890abcdef12345678"
        files:
          type: string
          format: binary
          description: Zip file containing your static site. Must have index.html at root.
        gitUrl:
          type: string
          description: (Not yet implemented) Git repository URL to clone and deploy
          example: https://github.com/user/repo

    DeployResponse:
      type: object
      properties:
        success:
          type: boolean
        url:
          type: string
          description: Live URL of the deployed site
          example: https://fittrack.dev
        domain:
          type: string
          example: fittrack.dev
        deployId:
          type: string
          description: Cloudflare Pages deployment ID
        status:
          type: string
          enum: [live, deploying, error]
          example: live
        ssl:
          type: boolean
          description: SSL is active (always true via Cloudflare)
        dns:
          type: boolean
          description: DNS is configured
        cfPagesUrl:
          type: string
          description: Cloudflare Pages URL (pages.dev subdomain)
          example: https://fittrack-dev.pages.dev
        note:
          type: string

    RedeployRequest:
      type: object
      required: [domain, owner, files]
      properties:
        domain:
          type: string
          description: Domain to redeploy
          example: fittrack.dev
        owner:
          type: string
          description: Wallet address (must match original deployer)
          example: "0x1234567890abcdef1234567890abcdef12345678"
        files:
          type: string
          format: binary
          description: Updated zip file

    RedeployResponse:
      type: object
      properties:
        success:
          type: boolean
        url:
          type: string
          example: https://fittrack.dev
        deployId:
          type: string
        status:
          type: string
          example: live

    AgentMeta:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        url:
          type: string
        openapi:
          type: string
        readme:
          type: string
        capabilities:
          type: array
          items:
            type: string
        payment:
          type: object
          properties:
            protocol:
              type: string
              example: x402
            network:
              type: string
              example: eip155:8453
            asset:
              type: string
              example: USDC
            assetAddress:
              type: string

    Error:
      type: object
      properties:
        error:
          type: string
          description: Error message

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Session token from /api/auth/verify

  responses:
    BadRequest:
      description: Bad request — invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: domain is required

    PaymentRequired:
      description: |
        Payment required via x402 protocol.
        Decode the X-Payment-Required header to get payment details.
        Sign a USDC authorization and retry with the X-Payment header.
      headers:
        X-Payment-Required:
          description: Base64-encoded JSON payment requirements
          schema:
            type: string
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: Payment required
              x402Version:
                type: integer
                example: 2
              accepts:
                type: array
                items:
                  type: object
                  properties:
                    scheme:
                      type: string
                      example: exact
                    network:
                      type: string
                      example: eip155:8453
                    payTo:
                      type: string
                    asset:
                      type: string
                    amount:
                      type: string

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Domain registration failed

    ServiceUnavailable:
      description: External API not configured
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Name.com API not configured
